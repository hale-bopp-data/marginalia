# Marginalia — CI Pipeline
# Markdown vault quality scanner: lint, test, GitHub mirror

trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

pool:
  name: Default

variables:
  - group: EasyWay-Secrets

stages:
  - stage: BuildAndTest
    displayName: 'Build, Lint & Test'
    jobs:
      - job: PythonTest
        displayName: 'Python Lint & Test'
        steps:
          - checkout: self

          - script: |
              set -e
              python3 --version
              python3 -m venv .venv
              source .venv/bin/activate
              pip install --upgrade pip
              pip install -e ".[dev]" 2>/dev/null || pip install -e .
              pip install pytest ruff
            displayName: 'Install dependencies'

          - script: |
              set -e
              source .venv/bin/activate
              ruff check src/ tests/ || echo "##[warning]Ruff lint issues found"
            displayName: 'Lint (Ruff)'
            continueOnError: true

          - script: |
              set -e
              source .venv/bin/activate
              python -m pytest tests/ -v --tb=short
            displayName: 'Test (pytest)'

  - stage: GitHubMirror
    displayName: 'GitHub Mirror (publish main+develop -> github)'
    dependsOn: BuildAndTest
    condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/develop')))
    jobs:
      - job: MirrorToGitHub
        displayName: 'Mirror to GitHub (canonical mirror-github.sh)'
        pool:
          name: Default
        steps:
          - checkout: self
            fetchDepth: 0
          - script: bash /opt/easyway/scripts/ci/mirror-github.sh hale-bopp-marginalia
            displayName: 'Mirror to GitHub'
            failOnStderr: true
            continueOnError: false
