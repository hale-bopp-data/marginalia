name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

      - name: Smoke test — scan
        run: marginalia scan . --json | python -c "import sys,json; d=json.load(sys.stdin); assert 'issues' in d, d"

      - name: Smoke test — link (dry-run)
        run: marginalia link . --json | python -c "import sys,json; d=json.load(sys.stdin); assert 'results' in d, d"

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check src/marginalia/ --select=E,F,W --ignore=E501

  obsidian-plugin:
    name: Build Obsidian plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: obsidian-plugin
        run: npm ci
      - name: Build
        working-directory: obsidian-plugin
        run: npm run build
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: marginalia-obsidian-plugin
          path: |
            obsidian-plugin/main.js
            obsidian-plugin/manifest.json
            obsidian-plugin/styles.css
